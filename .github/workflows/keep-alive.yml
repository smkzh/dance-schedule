name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜日 UTC 0:00 = JST 9:00
  workflow_dispatch: # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/circles?select=count" \
            > /dev/null
          echo "Ping complete"
